<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect hack
    // Store the current path and redirect to index.html
    sessionStorage.setItem('redirectPath', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace(window.location.origin + '/etc./');
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>

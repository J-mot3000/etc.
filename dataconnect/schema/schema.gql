type User @table {
  email: String!
  passwordHash: String!
  createdAt: Timestamp!
  role: String!
  displayName: String
  shippingAddress: String
  billingAddress: String
  phoneNumber: String
}

type Product @table {
  name: String!
  price: Float!
  stockQuantity: Int!
  createdAt: Timestamp!
  description: String
  imageUrl: String
  category: String
}

type Order @table {
  user: User!
  orderDate: Timestamp!
  totalAmount: Float!
  status: String!
  shippingAddress: String
}

type OrderItem @table {
  order: Order!
  product: Product!
  quantity: Int!
  unitPrice: Float!
}

type Cart @table {
  user: User!
  createdAt: Timestamp!
}

type CartItem @table {
  cart: Cart!
  product: Product!
  quantity: Int!
}
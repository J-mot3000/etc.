<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" role="img" aria-labelledby="title">
  <title id="title">etc. logo</title>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff7ab6" />
      <stop offset="0.6" stop-color="#ff4d9d" />
      <stop offset="1" stop-color="#ff3d9b" />
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#ff3d9b" flood-opacity="0.14" />
    </filter>
  </defs>

  <g transform="translate(20,20)">
    <rect width="120" height="120" rx="18" fill="url(#g)" filter="url(#s)" />
    <text x="60" y="78" fill="#ffffff" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="56" text-anchor="middle">
      etc.
    </text>
  </g>
</svg>
